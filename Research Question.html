<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Litree — New project</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { overflow: hidden; background: var(--lt-bg-primary); }
    .lt-spinner { width: 12px; height: 12px; border: 1.5px solid var(--lt-text-tertiary);
                  border-top-color: transparent; border-radius: 50%;
                  animation: ltspin 1s linear infinite; display: inline-block; }
    @keyframes ltspin { to { transform: rotate(360deg); } }
    button, input, select, textarea { font-family: inherit; }
    *:focus-visible { outline: 2px solid var(--lt-accent-hover); outline-offset: 1px; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--lt-bg-hover); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--lt-text-tertiary); background-clip: content-box; border: 2px solid transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./src/Primitives.jsx"></script>
<script type="text/babel" src="./src/Sidebar.jsx"></script>
<script type="text/babel" src="./src/Dropdown.jsx"></script>
<script type="text/babel" src="./src/ResearchQuestionPage.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "step": "refine"
  }/*EDITMODE-END*/;

  const SEED_PROJECTS = [
    { id: "p1", name: "Inequality & growth",         reviewCount: 2, question: "How does rising economic inequality affect intergenerational mobility and social cohesion in developing nations?" },
    { id: "p2", name: "Attention in transformers",   reviewCount: 0, question: "How do attention mechanisms shape generalization in large language models?" },
    { id: "p3", name: "Climate adaptation policy",   reviewCount: 1, question: "Which climate adaptation policies are most effective for coastal cities in the Global South?" },
  ];
  const USER = { name: "Jane Doe", email: "jane.doe@adb.org", initials: "JD" };

  function App() {
    const [projects] = useState(SEED_PROJECTS);
    /* New-project flow: no project selected */
    const [activeProject, setActiveProject] = useState(null);
    const [knobs, setKnobs] = useState(TWEAK_DEFAULTS);
    const [tweaksOpen, setTweaksOpen] = useState(false);

    useEffect(() => {
      const onMsg = (e) => {
        if (!e.data) return;
        if (e.data.type === "__activate_edit_mode")   setTweaksOpen(true);
        if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
      };
      window.addEventListener("message", onMsg);
      window.parent.postMessage({ type: "__edit_mode_available" }, "*");
      return () => window.removeEventListener("message", onMsg);
    }, []);

    const setKnob = (key, value) => {
      setKnobs(prev => ({ ...prev, [key]: value }));
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
    };

    return (
      <div style={{ display: "flex", height: "100%" }}>
        <Sidebar
          projects={projects}
          activeProjectId={activeProject}
          onSelectProject={(id) => { window.location.href = "Project Workspace.html"; }}
          onNewProject={() => {}}
          user={USER}
          badge="Beta"
          feedback={{ label: "Send feedback" }}
          docsHref="Journals documentation.html"
        />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          <ResearchQuestionPage knobs={knobs} />
        </div>

        {tweaksOpen && <TweaksPanel knobs={knobs} setKnob={setKnob} onClose={() => setTweaksOpen(false)} />}
      </div>
    );
  }

  function TweaksPanel({ knobs, setKnob, onClose }) {
    return (
      <div style={{
        position: "fixed", bottom: 20, right: 20, zIndex: 999,
        width: 280,
        background: "var(--lt-bg-surface)",
        border: "1px solid var(--lt-border-default)",
        borderRadius: 12,
        boxShadow: "var(--lt-elev-3)",
        padding: 16,
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ font: "600 13px/1 var(--lt-font-sans)", letterSpacing: "-0.01em", color: "var(--lt-text-primary)" }}>
            Tweaks
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: 0, cursor: "pointer", padding: 2, color: "var(--lt-text-tertiary)", display: "inline-flex" }}>
            <Icon name="x" size={14} color="currentColor" />
          </button>
        </div>

        <div style={{ marginBottom: 12 }}>
          <div style={{ font: "500 11px/1.5 var(--lt-font-sans)", color: "var(--lt-text-tertiary)", letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 6 }}>
            Wizard step
          </div>
          <div style={{
            display: "inline-flex",
            background: "var(--lt-bg-stone)",
            borderRadius: 8,
            padding: 2,
            width: "100%",
          }}>
            {[
              { v: "ask",    l: "1 · Ask" },
              { v: "refine", l: "2 · Refine" },
            ].map(o => {
              const active = o.v === knobs.step;
              return (
                <button key={o.v} onClick={() => setKnob("step", o.v)}
                  style={{
                    flex: 1,
                    background: active ? "var(--lt-bg-surface)" : "transparent",
                    color: active ? "var(--lt-text-primary)" : "var(--lt-text-tertiary)",
                    border: 0, cursor: "pointer",
                    borderRadius: 6, padding: "5px 6px",
                    boxShadow: active ? "var(--lt-elev-1)" : "none",
                    font: "500 12px/1 var(--lt-font-sans)", letterSpacing: "-0.005em",
                    transition: "background 120ms ease, color 120ms ease",
                  }}>{o.l}</button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
